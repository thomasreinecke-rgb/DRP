<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drp | Strategic Communications Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap');
        
        :root {
            --color-emerald: #10b981;
            --color-orange: #f97316;
            --color-indigo: #6366f1;
            --color-slate: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #000;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .logo-text {
            font-weight: 900;
            font-size: 1.75rem;
            letter-spacing: -0.06em;
            cursor: pointer;
        }

        .brand-marker {
            color: #10b981;
            margin-right: 2px;
        }

        .hero-title {
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -0.05em;
            font-size: clamp(3rem, 8vw, 7.5rem);
            text-transform: uppercase;
        }

        /* Optimierte Grid-Cards für bessere Klickbarkeit */
        .grid-card {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            min-height: 520px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3.5rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            z-index: 20; /* Erhöht, um Überlagerung zu vermeiden */
        }

        .grid-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.15);
        }

        .case-card {
            position: relative;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            min-height: 420px;
            padding: 2.5rem;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            cursor: pointer;
            overflow: hidden;
            color: #000;
            background-color: #f8fafc;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .case-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1;
            opacity: 0.9;
        }

        .case-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0.1) 100%);
            z-index: 2;
        }

        .case-content {
            position: relative;
            z-index: 3;
        }

        .case-card:hover .case-bg {
            transform: scale(1.08);
            opacity: 1;
        }

        .nav-link {
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
        }

        .view-hidden { 
            display: none !important; 
        }
        
        .fade-in {
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ph-cleantech { border-top: 6px solid var(--color-emerald); }
        .ph-food { border-top: 6px solid var(--color-orange); }
        .ph-family { border-top: 6px solid var(--color-indigo); }
        .ph-crisis { border-top: 6px solid var(--color-slate); }
